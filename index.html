<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halal Plane 🕌</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="amina.png">
    <link rel="apple-touch-icon" href="amina.png">
    <meta name="theme-color" content="#10B981">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 🎨 THEME: Emerald Green & Gold */
        :root { 
            --theme: #10B981; 
            --theme-ext: #3B82F6; 
            --dark-theme: #047857;
            --gold: #FFD700; 
            --bg: #0a0a0a; 
            --card-bg: rgba(22, 22, 22, 0.85); /* 카드 배경을 살짝 투명하게 */
            --text: #e0e0e0; 
        }
        
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Layout & Navigation */
        /* [변경] 배경 이미지 추가 (글씨 잘 보이게 어두운 오버레이 추가) */
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            transition: transform 0.4s ease-in-out; display: flex; flex-direction: column; 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('./bg.png') no-repeat center center fixed;
            background-size: cover;
            z-index: 100; 
        }
        .hidden-right { transform: translateX(100%); }
        .hidden-bottom { transform: translateY(100%); }
        .hidden-left { transform: translateX(-100%); }
        .active { transform: translate(0, 0); }

        .top-nav { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 500; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .passport-btn { font-size: 24px; cursor: pointer; background: rgba(16, 185, 129, 0.2); padding: 8px; border-radius: 12px; border: 1px solid var(--theme); }
        
        .lang-switcher { display: flex; gap: 5px; }
        .lang-btn { background: rgba(0,0,0,0.6); border: 1px solid #444; color: #888; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .lang-btn.active { background: var(--theme); color: white; border-color: var(--theme); font-weight: bold; }

        /* Main List */
        .header-title { text-align: center; padding: 10px 0; }
        .header-title div { color: var(--theme); font-size: 24px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .map-trigger-btn { margin-top: 10px; padding: 8px 20px; background: var(--theme); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }

        .country-select-container { text-align: center; margin: 10px 0; }
        #country-select { width: 85%; max-width: 400px; padding: 12px; background: rgba(26, 26, 26, 0.9); border: 1px solid var(--theme); color: white; border-radius: 10px; font-size: 16px; outline: none; }

        .filter-container { width: 100%; padding: 10px 0; overflow-x: auto; display: flex; gap: 8px; justify-content: center; scrollbar-width: none; }
        .type-btn { padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; background: rgba(26, 26, 26, 0.8); color: #ccc; border: 1px solid #444; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .type-btn.selected { background: var(--theme); color: white; border-color: var(--theme); }

        .list-container { flex: 1; overflow-y: auto; padding: 0 20px 100px 20px; }
        /* 카드가 배경 위에 뜨니까 반투명하게 */
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 16px; padding: 20px; margin-bottom: 15px; position: relative; transition: 0.3s; backdrop-filter: blur(5px); }
        .card.visited { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); }
        .visited-badge { position: absolute; top: -8px; right: -8px; background: var(--gold); color: black; font-weight: bold; padding: 4px 10px; border-radius: 12px; font-size: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; animation: popIn 0.3s ease; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-name { font-size: 18px; font-weight: bold; color: var(--theme); }
        .card-dist { font-size: 12px; color: #888; margin-left: 5px; font-weight: normal; }
        .card-label { font-size: 10px; padding: 3px 8px; border-radius: 6px; background: rgba(16, 185, 129, 0.1); color: var(--theme); border: 1px solid var(--theme); }
        .card-desc { font-size: 13px; color: #ccc; line-height: 1.5; margin-bottom: 15px; }
        .card-actions { display: flex; gap: 8px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-review { background: var(--theme); color: white; }
        .btn-map { background: #333; color: white; border: 1px solid #555; }

        /* [변경] Floating Button (Amina Face) */
        .amina-btn { 
            position: fixed; bottom: 30px; right: 20px; width: 75px; height: 75px; border-radius: 50%; 
            background: #000 url('./amina.png') no-repeat center center; 
            background-size: cover; /* 얼굴 꽉 차게 */
            border: 3px solid var(--theme); z-index: 999; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); /* 네온 효과 강화 */
            cursor: pointer; transition: transform 0.2s; 
        }
        .amina-btn:active { transform: scale(0.9); }

        /* Sub Pages Navigation */
        .nav-bar {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid #333;
            background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(8px);
            flex-shrink: 0;
        }
        .nav-actions { display: flex; gap: 8px; align-items: center; }
        .nav-btn {
            min-width: 42px; height: 42px; padding: 0 12px;
            border-radius: 12px; border: 1px solid #444;
            background: rgba(255,255,255,0.06); color: white;
            font-size: 18px; cursor: pointer; transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { border-color: var(--theme); background: rgba(16,185,129,0.15); }
        .nav-btn.nav-home { font-size: 16px; }
        .nav-title { flex: 1; text-align: center; font-weight: bold; font-size: 16px; color: var(--theme); letter-spacing: 0.5px; }
        .nav-spacer { width: 92px; }

        /* Detail Page */
        #detail-map { width: 100%; height: 35vh; border-bottom: 2px solid var(--theme); }
        .review-box { flex: 1; overflow-y: auto; padding: 25px; background: rgba(0,0,0,0.8); }
        .review-title { font-size: 24px; color: var(--theme); font-weight: bold; margin-bottom: 5px; }
        .review-sub { font-size: 14px; color: #888; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .review-content { font-size: 15px; line-height: 1.8; color: #ddd; white-space: pre-wrap; font-family: 'Segoe UI', serif; }
        .review-sign { text-align: right; margin-top: 20px; color: var(--theme); font-weight: bold; font-style: italic; }
        .review-actions { display: flex; gap: 10px; margin-top: 30px; padding-bottom: 30px; }
        .btn-add-db { background: #F59E0B; color: black; margin-top: 10px; width: 100%; }

        /* Map Page */
        .map-search-box { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: flex; gap: 10px; z-index: 1000; }
        .map-input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 2px solid var(--theme); background: rgba(0,0,0,0.85); color: white; outline: none; }
        .gps-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--theme); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Passport Page */
        .passport-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; overflow-y: auto; }
        .stamp { aspect-ratio: 1; border: 2px dashed #444; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; background: rgba(17, 17, 17, 0.8); text-align: center; padding: 5px; }
        .stamp.active { border: 2px solid var(--gold); background: rgba(255, 215, 0, 0.1); color: var(--gold); }
        .stamp-icon { font-size: 24px; margin-bottom: 5px; }

        /* Chat Page */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.7); }
        .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .chat-bot { align-self: flex-start; background: #222; border: 1px solid #333; color: #eee; border-top-left-radius: 4px; }
        .chat-user { align-self: flex-end; background: var(--theme); color: white; border-top-right-radius: 4px; font-weight: 500; }
        .chat-input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; outline: none; }
        .chat-send { padding: 0 20px; background: var(--theme); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* [Fix 5] Reco Btn CSS Added */
        .reco-btn { margin-top: 8px; padding: 10px 12px; background: var(--theme); border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center;}
        .reco-btn.external { background: var(--theme-ext); border: 1px dashed #60A5FA; }
        .map-link {
            display: inline-block; margin-top: 6px; padding: 8px 12px;
            background: rgba(59,130,246,0.15); border: 1px solid #3B82F6;
            border-radius: 8px; color: #93C5FD; text-decoration: none; font-size: 13px;
        }
        .map-link:hover { background: rgba(59,130,246,0.25); }
        .chat-msg a { color: #6EE7B7; word-break: break-all; }
        .review-content a { color: #6EE7B7; word-break: break-all; }

        /* Leaflet Custom */
        .leaflet-popup-content-wrapper { background: #1a1a1a; color: white; border: 1px solid var(--theme); }
        .leaflet-popup-content { margin: 10px; width: 200px !important; }
        .popup-btn { width: 100%; margin-top: 5px; padding: 6px; border-radius: 4px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="page-main" class="page active">
        <div class="top-nav">
            <div class="passport-btn" onclick="nav('page-passport', 'right')">🎫</div>
            <div class="lang-switcher">
                <div class="lang-btn active" id="lang-KO" onclick="setLang('KO')">KR</div>
                <div class="lang-btn" id="lang-EN" onclick="setLang('EN')">EN</div>
                <div class="lang-btn" id="lang-JP" onclick="setLang('JP')">JP</div>
                <div class="lang-btn" id="lang-CN" onclick="setLang('CN')">CN</div>
            </div>
        </div>
        
        <div class="header-title">
            <div>HALAL PLANE</div>
            <button class="map-trigger-btn" onclick="nav('page-map', 'bottom'); initMap();">🗺️ EXPLORE WORLD</button>
        </div>

        <div class="country-select-container">
            <select id="country-select" onchange="filterCountry(this.value)"></select>
        </div>

        <div class="filter-container" id="filter-box"></div>
        <div class="list-container" id="place-list"></div>
        
        <div class="amina-btn" onclick="nav('page-chat', 'bottom'); startChat();"></div>
    </div>

    <div id="page-passport" class="page hidden-left">
        <div class="nav-bar">
            <div class="nav-actions">
                <button class="nav-btn" onclick="navBack()" title="Back">←</button>
                <button class="nav-btn nav-home" onclick="navHome()" title="Home">🏠</button>
            </div>
            <div class="nav-title" id="nav-title-passport">MY PASSPORT</div>
            <div class="nav-spacer"></div>
        </div>
        <div id="stamp-grid" class="passport-grid"></div>
    </div>

    <div id="page-map" class="page hidden-bottom">
        <div class="nav-bar">
            <div class="nav-actions">
                <button class="nav-btn" onclick="navBack()" title="Back">←</button>
                <button class="nav-btn nav-home" onclick="navHome()" title="Home">🏠</button>
            </div>
            <div class="nav-title" id="nav-title-map">WORLD MAP</div>
            <div class="nav-spacer"></div>
        </div>
        <div class="map-search-box">
            <input id="map-input" class="map-input" type="text" placeholder="Search Place..." onkeydown="if(event.key==='Enter') searchMap()">
            <button class="gps-btn" onclick="panToUser()">◎</button>
        </div>
        <div id="world-map" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="page-chat" class="page hidden-bottom">
        <div class="nav-bar">
            <div class="nav-actions">
                <button class="nav-btn" onclick="navBack()" title="Back">←</button>
                <button class="nav-btn nav-home" onclick="navHome()" title="Home">🏠</button>
            </div>
            <div class="nav-title" id="nav-title-chat">Amina (AI Guide)</div>
            <div class="nav-spacer"></div>
        </div>
        <div id="chat-box" class="chat-container"></div>
        <div class="chat-input-area">
            <input id="chat-msg-input" class="chat-input" type="text" placeholder="Ask Amina..." onkeydown="if(event.key==='Enter') sendChat()">
            <button class="chat-send" onclick="sendChat()">➤</button>
        </div>
    </div>

    <div id="page-detail" class="page hidden-right">
        <div class="nav-bar">
            <div class="nav-actions">
                <button class="nav-btn" onclick="navBack()" title="Back">←</button>
                <button class="nav-btn nav-home" onclick="navHome()" title="Home">🏠</button>
            </div>
            <div class="nav-title" id="nav-title-detail">Amina's Note</div>
            <div class="nav-spacer"></div>
        </div>
        <div id="detail-map"></div>
        <div class="review-box">
            <div id="review-title" class="review-title">Loading...</div>
            <div id="review-sub" class="review-sub"></div>
            <div id="review-content" class="review-content">
                Wait a moment, Amina is checking the Halal status... 🕌
            </div>
            <div class="review-actions">
                <button id="btn-open-map" class="action-btn btn-map">🗺️ SEARCH MAP</button>
                <button id="btn-stamp" class="action-btn btn-review">✈️ STAMP</button>
            </div>
            <div id="add-db-area"></div>
        </div>
    </div>

    <script type="module">
        import { AIBrain } from './ai_brain.js';

        // ⚙️ CONFIG
        let GROQ_API_KEY = "GROQ_KEY_PLACEHOLDER";
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNTKjVwyPYpXBkAux_dPlqV6V2QMAe-uXcH0kkS0e9VQxKABasjiNT0smYJiogQ6oOM1vpxZ3bPz0a/pub?output=csv";
        
        // 🔥 [REAL] Google Apps Script URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbygfW03xWaYq4t3pqTBD8WvUBOHiqkLEH0BSD8OQxjwD6ZIpUdp2VtrGLarpjlhVw/exec";

        // Global State
        let PLACE_DB = {};
        let currentLang = 'KO';
        let currentFilter = 'All';
        let currentCountry = '';
        let visitedPlaces = JSON.parse(localStorage.getItem('visitedPlaces') || '[]');
        let requestList = JSON.parse(localStorage.getItem('requestList') || '[]'); 
        let userLat = null, userLon = null;
        let mapInstance = null, detailMapInstance = null;
        let markerLayer = null;
        let chatHistory = [];
        let amina = null;
        let navStack = ['page-main'];

        const TRANSLATIONS = {
            "KO": {
                langCode: "KO",
                ai: "Korean",
                greet: "앗살라무 알라이쿰! 🕌 저는 할랄 여행 가이드 아미나예요. 맛집, 기도실, 동네 추천 무엇이든 물어보세요!",
                thinking: "아미나가 여행 코스를 확인하고 있어요... 🕌",
                reviewing: "아미나가 할랄 정보를 확인하고 있어요... 🕌",
                filters: ["🌐 전체", "🍚 아시안", "🍔 웨스턴", "🥙 중동", "☕ 카페", "🕌 기도실"],
                nav: { passport: "내 여권", map: "세계 지도", chat: "아미나 AI 가이드", detail: "아미나 여행 노트" },
                ui: {
                    explore: "🗺️ 세계 지도 보기",
                    aiReview: "AI 리뷰",
                    map: "지도",
                    searchMap: "🗺️ 지도 검색",
                    stamp: "✈️ 스탬프",
                    saveDb: "➕ DB에 저장 요청",
                    visited: "🏆 방문함",
                    chatPlaceholder: "아미나에게 여행 질문하기...",
                    mapPlaceholder: "장소 검색...",
                    loadingReview: "잠시만요, 아미나가 할랄 상태를 확인 중이에요... 🕌"
                }
            },
            "EN": {
                langCode: "EN",
                ai: "English",
                greet: "Assalamu Alaikum! 🕌 I'm Amina, your Halal travel guide. Ask me about food, mosques, neighborhoods, or trip tips!",
                thinking: "Amina is planning your route... 🕌",
                reviewing: "Amina is checking Halal details... 🕌",
                filters: ["🌐 All", "🍚 Asian", "🍔 Western", "🥙 Middle East", "☕ Cafe", "🕌 Mosque"],
                nav: { passport: "My Passport", map: "World Map", chat: "Amina AI Guide", detail: "Amina's Travel Note" },
                ui: {
                    explore: "🗺️ Explore World",
                    aiReview: "AI REVIEW",
                    map: "MAP",
                    searchMap: "🗺️ SEARCH MAP",
                    stamp: "✈️ STAMP",
                    saveDb: "➕ Save to Database",
                    visited: "🏆 VISITED",
                    chatPlaceholder: "Ask Amina about your trip...",
                    mapPlaceholder: "Search place...",
                    loadingReview: "Wait a moment, Amina is checking Halal status... 🕌"
                }
            },
            "JP": {
                langCode: "JP",
                ai: "Japanese",
                greet: "アッサラーム・アライクム！🕌 ハラール旅行ガイドのアミナです。レストラン、モスク、観光の相談をどうぞ！",
                thinking: "アミナが旅行プランを確認中... 🕌",
                reviewing: "アミナがハラール情報を確認中... 🕌",
                filters: ["🌐 全部", "🍚 アジア", "🍔 洋食", "🥙 中東", "☕ カフェ", "🕌 モスク"],
                nav: { passport: "マイパスポート", map: "世界地図", chat: "アミナ AIガイド", detail: "アミナの旅行ノート" },
                ui: {
                    explore: "🗺️ 世界地図",
                    aiReview: "AIレビュー",
                    map: "地図",
                    searchMap: "🗺️ 地図検索",
                    stamp: "✈️ スタンプ",
                    saveDb: "➕ DB保存リクエスト",
                    visited: "🏆 訪問済",
                    chatPlaceholder: "アミナに旅行の質問...",
                    mapPlaceholder: "場所を検索...",
                    loadingReview: "アミナがハラール情報を確認中... 🕌"
                }
            },
            "CN": {
                langCode: "CN",
                ai: "Chinese",
                greet: "色兰！🕌 我是您的Halal旅行向导Amina。欢迎咨询餐厅、清真寺和旅行建议！",
                thinking: "Amina正在为您规划路线... 🕌",
                reviewing: "Amina正在核实Halal信息... 🕌",
                filters: ["🌐 全部", "🍚 亚洲", "🍔 西餐", "🥙 中东", "☕ 咖啡", "🕌 清真寺"],
                nav: { passport: "我的护照", map: "世界地图", chat: "Amina AI向导", detail: "Amina旅行笔记" },
                ui: {
                    explore: "🗺️ 探索世界",
                    aiReview: "AI 点评",
                    map: "地图",
                    searchMap: "🗺️ 搜索地图",
                    stamp: "✈️ 盖章",
                    saveDb: "➕ 保存到数据库",
                    visited: "🏆 已访问",
                    chatPlaceholder: "向Amina提问旅行问题...",
                    mapPlaceholder: "搜索地点...",
                    loadingReview: "请稍候，Amina正在核实Halal状态... 🕌"
                }
            }
        };

        // 🚀 INIT
        window.onload = async () => {
            if (!GROQ_API_KEY || GROQ_API_KEY.includes("PLACEHOLDER")) {
                const inputKey = prompt("Groq API Key:");
                if (inputKey) GROQ_API_KEY = inputKey;
            }
            amina = new AIBrain(GROQ_API_KEY, TRANSLATIONS[currentLang]);
            await amina.ensureModelsLoaded();
            updateUILabels();
            await loadData();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    renderList();
                });
            }
        };

        function escapeJsStr(str) {
            return String(str || "")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/\n/g, "\\n")
                .replace(/\r/g, "");
        }

        function resetDetailMap(message = null) {
            if (detailMapInstance) {
                detailMapInstance.remove();
                detailMapInstance = null;
            }
            const mapEl = document.getElementById('detail-map');
            mapEl.innerHTML = message
                ? `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">${message}</div>`
                : "";
        }

        function parseCsvText(text) {
            const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const rows = normalized.split('\n').map(row => {
                if (!row.trim()) return [];
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                return row.split(regex).map(cell => {
                    let val = cell.trim();
                    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                    return val.replace(/""/g, '"');
                });
            });

            if (!rows.length || !rows[0].length) throw new Error("Empty spreadsheet data");

            const headers = rows[0].map(h => h.trim());
            const places = [];

            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length < headers.length) continue;
                const obj = {};
                rows[i].forEach((val, idx) => { if (headers[idx]) obj[headers[idx]] = val; });
                if (obj.Country) {
                    obj.lat = parseFloat(obj.lat);
                    obj.lon = parseFloat(obj.lon);
                    places.push(obj);
                }
            }

            return places;
        }

        function buildPlaceDb(places) {
            PLACE_DB = {};
            places.forEach(place => {
                if (!PLACE_DB[place.Country]) PLACE_DB[place.Country] = [];
                PLACE_DB[place.Country].push(place);
            });
        }

        function renderCountrySelect() {
            const select = document.getElementById('country-select');
            select.innerHTML = "";
            const countries = Object.keys(PLACE_DB).sort();
            countries.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                select.appendChild(opt);
            });

            if (countries.length > 0) {
                currentCountry = countries.includes(currentCountry) ? currentCountry : countries[0];
                select.value = currentCountry;
                renderFilters();
                renderList();
            }
        }

        async function fetchTextWithRetry(url, retries = 3) {
            let lastError = null;
            for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                    const res = await fetch(`${url}${url.includes('?') ? '&' : '?'}_ts=${Date.now()}`, {
                        cache: 'no-store',
                        redirect: 'follow'
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.text();
                } catch (error) {
                    lastError = error;
                    if (attempt < retries) await new Promise(resolve => setTimeout(resolve, attempt * 500));
                }
            }
            throw lastError || new Error('Network error');
        }

        async function loadDataFromCsv() {
            const text = await fetchTextWithRetry(SHEET_CSV_URL);
            return parseCsvText(text);
        }

        async function loadDataFromGas() {
            const res = await fetch(`${GAS_URL}?action=data&_ts=${Date.now()}`, {
                cache: 'no-store',
                redirect: 'follow'
            });
            const raw = await res.text();

            if (!res.ok || /Script function not found|Error/i.test(raw)) {
                throw new Error('Google Apps Script data endpoint unavailable');
            }

            const payload = JSON.parse(raw);
            if (!payload.ok || !Array.isArray(payload.places)) {
                throw new Error(payload.error || 'Invalid Apps Script response');
            }

            return payload.places.map(place => ({
                ...place,
                lat: parseFloat(place.lat),
                lon: parseFloat(place.lon)
            }));
        }

        async function loadData() {
            const errors = [];

            try {
                buildPlaceDb(await loadDataFromCsv());
                renderCountrySelect();
                return;
            } catch (error) {
                errors.push(`CSV: ${error.message}`);
                console.warn(error);
            }

            try {
                buildPlaceDb(await loadDataFromGas());
                renderCountrySelect();
                return;
            } catch (error) {
                errors.push(`GAS: ${error.message}`);
                console.warn(error);
            }

            document.getElementById('place-list').innerHTML =
                `<div class="card"><div class="card-desc">장소 데이터를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.<br><span style="color:#888;font-size:12px;">${errors.join(' | ')}</span></div></div>`;
        }

        async function submitPlaceRequest(name, country) {
            const params = new URLSearchParams({ action: 'add', name, country });
            const attempts = [
                () => fetch(`${GAS_URL}?${params.toString()}`, { redirect: 'follow' }),
                () => fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString(),
                    redirect: 'follow'
                }),
                () => fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', name, country }),
                    redirect: 'follow'
                })
            ];

            let lastError = 'Google Apps Script request failed';
            for (const attempt of attempts) {
                try {
                    const res = await attempt();
                    const raw = await res.text();

                    if (/Script function not found|Error/i.test(raw)) {
                        lastError = 'Apps Script에 doGet/doPost가 없습니다. gas/Code.gs를 다시 배포해 주세요.';
                        continue;
                    }

                    const payload = JSON.parse(raw);
                    if (payload.ok) return payload;
                    lastError = payload.error || lastError;
                } catch (error) {
                    lastError = error.message;
                }
            }

            throw new Error(lastError);
        }

        function t(key) {
            const parts = key.split('.');
            let val = TRANSLATIONS[currentLang];
            for (const part of parts) val = val?.[part];
            return val || key;
        }

        function updateUILabels() {
            const tr = TRANSLATIONS[currentLang];
            document.getElementById('nav-title-passport').innerText = tr.nav.passport;
            document.getElementById('nav-title-map').innerText = tr.nav.map;
            document.getElementById('nav-title-chat').innerText = tr.nav.chat;
            document.getElementById('nav-title-detail').innerText = tr.nav.detail;
            document.querySelector('.map-trigger-btn').innerText = tr.ui.explore;
            document.getElementById('chat-msg-input').placeholder = tr.ui.chatPlaceholder;
            document.getElementById('map-input').placeholder = tr.ui.mapPlaceholder;
            document.getElementById('btn-open-map').innerText = tr.ui.searchMap;
            document.getElementById('btn-stamp').innerText = tr.ui.stamp;
        }

        function formatAminaReply(reply) {
            let fmt = reply.replace(/\[(.*?)\](\s*\(External\))?/g, (match, placeName, externalTag) => {
                const isExternal = !!externalTag;
                const btnClass = isExternal ? "reco-btn external" : "reco-btn";
                const label = isExternal ? `🌐 ${placeName}` : `📍 ${placeName}`;
                return `<br><button class="${btnClass}" onclick="openReview('${escapeJsStr(placeName)}', '${escapeJsStr(currentCountry)}', ${isExternal})">${label}</button>`;
            });

            fmt = fmt.replace(/Map:\s*(https:\/\/[^\s<\n]+)/gi, (match, url) =>
                `<br><a href="${url}" target="_blank" rel="noopener" class="map-link">🗺️ Google Maps</a>`
            );

            fmt = fmt.replace(/(https:\/\/(?:www\.)?google\.com\/maps[^\s<\n]+)/gi, (match, url) =>
                `<a href="${url}" target="_blank" rel="noopener" class="map-link">🗺️ Google Maps</a>`
            );

            fmt = fmt.replace(/\n/g, '<br>');
            return fmt;
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active', 'hidden-left', 'hidden-right', 'hidden-bottom');
                if (p.id !== pageId) p.classList.add('hidden-left');
            });
            const target = document.getElementById(pageId);
            target.classList.remove('hidden-left', 'hidden-right', 'hidden-bottom');
            target.classList.add('active');
        }

        // UI Functions
        window.nav = function(pageId, effect = 'left', replaceHistory = false) {
            const current = document.querySelector('.page.active');
            if (!replaceHistory && current && current.id !== pageId) {
                navStack.push(current.id);
            }
            if (pageId === 'page-main') {
                navStack = ['page-main'];
            }
            showPage(pageId);
            if (pageId === 'page-passport') renderPassport();
        }

        window.navBack = function() {
            if (navStack.length > 1) {
                navStack.pop();
                showPage(navStack[navStack.length - 1]);
                return;
            }
            navHome();
        }

        window.navHome = function() {
            navStack = ['page-main'];
            showPage('page-main');
        }

        window.setLang = function(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`lang-${lang}`).classList.add('active');
            if (amina) amina.t = TRANSLATIONS[lang];
            updateUILabels();
            renderFilters();
            renderList();
        }

        function renderFilters() {
            const box = document.getElementById('filter-box');
            box.innerHTML = '';
            TRANSLATIONS[currentLang].filters.forEach((label, idx) => {
                const types = ["All", "Asian", "Western", "Middle East", "Cafe", "Mosque"];
                const typeKey = types[idx];
                const btn = document.createElement('div');
                btn.className = `type-btn ${currentFilter === typeKey ? 'selected' : ''}`;
                btn.innerText = label;
                btn.onclick = () => { currentFilter = typeKey; renderFilters(); renderList(); };
                box.appendChild(btn);
            });
        }

        window.filterCountry = function(c) { currentCountry = c; renderList(); }

        function renderList() {
            const list = document.getElementById('place-list');
            list.innerHTML = '';
            const places = PLACE_DB[currentCountry] || [];
            
            const filtered = places.filter(p => {
                if(currentFilter === 'All') return true;
                if(currentFilter === 'Mosque') return (p.category && (p.category.includes('Place') || p.category.includes('Mosque')));
                return (p.category && p.category.includes(currentFilter));
            });

            filtered.forEach(p => {
                const isVisited = visitedPlaces.includes(p.name);
                const langKey = currentLang.toLowerCase();
                const desc = p[`desc_${langKey}`] || p.desc_ko || "";
                const nameKoHtml = p.name_ko ? `<span style="font-size:0.8em; color:#047857; margin-left:4px;">(${p.name_ko})</span>` : "";
                
                let distHtml = "";
                if(userLat && userLon && p.lat && p.lon) {
                    const dist = calcDist(userLat, userLon, p.lat, p.lon);
                    distHtml = `<span class="card-dist">(📍 ${dist}km)</span>`;
                }

                const div = document.createElement('div');
                div.className = `card ${isVisited ? 'visited' : ''}`;
                div.innerHTML = `
                    ${isVisited ? `<div class="visited-badge">${t('ui.visited')}</div>` : ''}
                    <div class="card-header">
                        <div class="card-name">${p.name} ${nameKoHtml} ${distHtml}</div>
                        <div class="card-label">${p.label || p.category}</div>
                    </div>
                    <div class="card-desc">${desc}</div>
                    <div class="card-actions">
                        <button class="action-btn btn-review" onclick="openReview('${escapeJsStr(p.name)}', '${escapeJsStr(currentCountry)}')">${t('ui.aiReview')}</button>
                        <button class="action-btn btn-map" onclick="window.open('${getMapLink(p, currentCountry)}', '_blank')">${t('ui.map')}</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderPassport() {
            const grid = document.getElementById('stamp-grid');
            grid.innerHTML = '';
            [...visitedPlaces].reverse().forEach(name => {
                const el = document.createElement('div');
                el.className = 'stamp active';
                el.innerHTML = `<div class="stamp-icon">🥩</div><div>${name}</div>`;
                grid.appendChild(el);
            });
        }

        window.openReview = async function(name, country, isExternal = false) {
            nav('page-detail', 'right');
            document.getElementById('review-title').innerText = name;
            document.getElementById('review-sub').innerText = country + (isExternal ? " (WEB SEARCH)" : "");
            document.getElementById('review-content').innerText = t('reviewing');
            
            const addArea = document.getElementById('add-db-area');
            addArea.innerHTML = ""; 

            let place = null;
            if (!isExternal && PLACE_DB[country]) place = PLACE_DB[country].find(p => p.name === name);

            document.getElementById('btn-open-map').onclick = () => {
                if (place) window.open(getMapLink(place, country), '_blank');
                else {
                    const query = name + " " + country;
                    const url = (country.includes("Korea") || country.includes("한국")) 
                        ? "https://map.naver.com/p/search/" + encodeURIComponent(query)
                        : "https://www.google.com/maps/search/" + encodeURIComponent(query);
                    window.open(url, '_blank');
                }
            };

            if (isExternal) {
                const addBtn = document.createElement('button');
                addBtn.className = "action-btn btn-add-db";
                addBtn.innerText = t('ui.saveDb');
                
                addBtn.onclick = async () => {
                    addBtn.innerText = "⏳ Saving...";
                    addBtn.disabled = true;

                    try {
                        await submitPlaceRequest(name, country);

                        alert(`✅ Success! "${name}" has been requested.`);
                        addBtn.innerText = "✔ Requested";
                        addBtn.style.background = "#10B981";

                        if (!requestList.includes(name)) {
                            requestList.push(name);
                            localStorage.setItem('requestList', JSON.stringify(requestList));
                        }
                    } catch (error) {
                        console.error(error);
                        alert(`❌ Failed to send request.\n${error.message}`);
                        addBtn.innerText = "Retry";
                        addBtn.disabled = false;
                    }
                };
                addArea.appendChild(addBtn);
                document.getElementById('btn-stamp').style.display = 'none';
            } else {
                document.getElementById('btn-stamp').style.display = 'block';
                document.getElementById('btn-stamp').onclick = () => markVisited(name);
            }

            if(place && place.lat && place.lon) {
                resetDetailMap();
                detailMapInstance = L.map('detail-map').setView([place.lat, place.lon], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(detailMapInstance);
                L.marker([place.lat, place.lon]).addTo(detailMapInstance);
            } else {
                resetDetailMap("No Map Data (External)");
            }

            const reply = await amina.writeReview(name, country, isExternal, place);
            document.getElementById('review-content').innerHTML = formatAminaReply(reply);
        }

        window.sendChat = async function() {
            const input = document.getElementById('chat-msg-input');
            const txt = input.value.trim();
            if(!txt) return;
            addChatBubble(txt, 'user');
            input.value = '';
            addChatBubble(t('thinking'), 'bot', false, 'temp-loading');

            const userLoc = (userLat) ? {lat: userLat, lon: userLon} : null;
            const reply = await amina.ask(txt, chatHistory, PLACE_DB, currentCountry, userLoc, currentLang);
            
            const loading = document.getElementById('temp-loading');
            if(loading) loading.remove();

            addChatBubble(formatAminaReply(reply), 'bot', true);
            chatHistory.push({role: "user", content: txt});
            chatHistory.push({role: "assistant", content: reply});
        }

        function addChatBubble(text, sender, isHtml = false, id = null) {
            const box = document.getElementById('chat-box');
            const el = document.createElement('div');
            el.className = `chat-msg chat-${sender}`;
            if(id) el.id = id;
            if(isHtml) el.innerHTML = text; else el.innerText = text;
            box.appendChild(el);
            box.scrollTop = box.scrollHeight;
        }

        window.startChat = function() {
            if(chatHistory.length === 0) addChatBubble(TRANSLATIONS[currentLang].greet, 'bot');
        }

        window.initMap = function() {
            if(!mapInstance) {
                mapInstance = L.map('world-map').setView([20, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                markerLayer = L.layerGroup().addTo(mapInstance);
            }
            markerLayer.clearLayers();
            for(let c in PLACE_DB) {
                PLACE_DB[c].forEach(p => {
                    if(p.lat && p.lon) {
                        const html = `<div><b>${p.name}</b><br><button class="popup-btn" style="background:#10B981;color:white;" onclick="openReview('${escapeJsStr(p.name)}', '${escapeJsStr(c)}')">REVIEW</button></div>`;
                        L.marker([p.lat, p.lon]).addTo(markerLayer).bindPopup(html);
                    }
                });
            }
        }

        window.searchMap = function() {
            const q = document.getElementById('map-input').value.toLowerCase();
            if(!q) return;
            let found = false;
            for(let c in PLACE_DB) {
                for(let p of PLACE_DB[c]) {
                    const str = (p.name + " " + p.name_ko).toLowerCase();
                    if(str.includes(q) && p.lat) {
                        mapInstance.setView([p.lat, p.lon], 16);
                        L.popup().setLatLng([p.lat, p.lon]).setContent(`<b>${p.name}</b>`).openOn(mapInstance);
                        found = true; break;
                    }
                }
                if(found) break;
            }
            if(!found) alert("Place not found in DB.");
        }

        window.panToUser = function() {
            if(userLat && userLon && mapInstance) mapInstance.setView([userLat, userLon], 14);
            else alert("Waiting for GPS...");
        }

        function markVisited(name) {
            if(!visitedPlaces.includes(name)) {
                visitedPlaces.push(name);
                localStorage.setItem('visitedPlaces', JSON.stringify(visitedPlaces));
                alert("✈️ Stamped on Passport!");
                renderList(); 
            } else alert("Already visited!");
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * (Math.PI/180);
            const dLon = (lon2-lon1) * (Math.PI/180); 
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180)) * Math.cos(lat2*(Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return (R * c).toFixed(1);
        }

        function getMapLink(p, c) {
            if(c.includes("Korea") || c.includes("한국")) {
                if(p.name_ko) return "https://map.naver.com/p/search/" + encodeURIComponent(p.name_ko);
                return "https://map.naver.com/p/search/" + encodeURIComponent(p.name);
            }
            return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(p.name + " " + p.address);
        }
    </script>
